name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          SESSION_SECRET: ci-build-secret-minimum-32-characters-long
          SUPABASE_URL: https://example.supabase.co
          SUPABASE_PUBLISHABLE_KEY: placeholder
